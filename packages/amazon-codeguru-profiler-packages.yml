    registry: npm
    name: "@aws-sdk/client-codeguruprofiler"
    url: https://www.npmjs.com/package/@aws-sdk/client-codeguruprofiler
    install: npm install @aws-sdk/client-codeguruprofiler
    version: 3.1079.0
    official: true
    kind: sdk
  - language: python
    registry: pypi
    name: boto3
    url: https://pypi.org/project/boto3/
    install: pip install boto3
    official: true
    kind: sdk
    notes: AWS SDK for Python; codeguruprofiler client via boto3.client('codeguruprofiler').
  - language: python
    registry: pypi
    name: codeguru-profiler-agent
    url: https://pypi.org/project/codeguru-profiler-agent/
    install: pip install codeguru-profiler-agent
    official: true
    kind: agent
    notes: First-party Python profiling agent that reports runtime data to CodeGuru Profiler.
  - language: java
    registry: maven
    name: software.amazon.codeguruprofiler:codeguru-profiler-java-agent
    url: https://central.sonatype.com/artifact/software.amazon.codeguruprofiler/codeguru-profiler-java-agent
    install: "maven: software.amazon.codeguruprofiler:codeguru-profiler-java-agent:1.2.6"
    version: 1.2.6
    official: true
    kind: agent
    notes: First-party JVM profiling agent (published to Maven Central).
