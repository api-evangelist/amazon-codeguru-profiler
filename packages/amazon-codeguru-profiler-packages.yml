    url: https://pkg.go.dev/github.com/aws/aws-sdk-go-v2/service/codeguruprofiler
    install: go get github.com/aws/aws-sdk-go-v2/service/codeguruprofiler
    official: true
    kind: sdk
  - language: ruby
