generated: '2026-06-20'
method: searched
source: https://docs.aws.amazon.com/codeguru/latest/profiler-ug/setting-up.html
description: >-
  First-party AWS client libraries and profiling agents for Amazon CodeGuru
  Profiler. The service is exposed through the standard AWS SDKs (one
  codeguruprofiler client per language) plus dedicated JVM and Python profiling
  agents that submit runtime data to the ConfigureAgent / PostAgentProfile
  operations.
packages:
