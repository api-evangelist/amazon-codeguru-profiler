                  value: example-value
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
              examples:
                ConfigureAgent482Example:
                  summary: Default ConfigureAgent 482 response
